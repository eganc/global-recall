<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Global Recall - Start Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .board-texture {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .linen-overlay {
            position: relative;
        }
        .linen-overlay::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "surface-bright": "#4c332f",
                        "inverse-on-surface": "#422a27",
                        "tertiary-fixed-dim": "#acc7ff",
                        "on-primary-fixed-variant": "#930100",
                        "surface-container-high": "#3b2420",
                        "on-tertiary-container": "#00285b",
                        "primary-fixed": "#ffdad4",
                        "secondary": "#b9c3ff",
                        "surface-container-highest": "#472f2b",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#b9c3ff",
                        "outline-variant": "#603e39",
                        "surface-container": "#2f1a17",
                        "primary-fixed-dim": "#ffb4a8",
                        "secondary-container": "#0038ca",
                        "background": "#210e0b",
                        "on-tertiary-fixed-variant": "#004491",
                        "surface-dim": "#210e0b",
                        "inverse-primary": "#c00100",
                        "tertiary-fixed": "#d7e2ff",
                        "surface-container-lowest": "#1b0907",
                        "surface": "#210e0b",
                        "secondary-fixed": "#dde1ff",
                        "on-background": "#ffdad4",
                        "inverse-surface": "#ffdad4",
                        "on-tertiary-fixed": "#001a40",
                        "surface-variant": "#472f2b",
                        "on-surface": "#ffdad4",
                        "tertiary": "#acc7ff",
                        "surface-container-low": "#2b1613",
                        "on-primary": "#690100",
                        "surface-tint": "#ffb4a8",
                        "on-secondary-fixed": "#001356",
                        "on-secondary": "#002389",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#410000",
                        "outline": "#b18780",
                        "on-surface-variant": "#ebbbb4",
                        "primary": "#ffb4a8",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#0034bf",
                        "tertiary-container": "#488fff",
                        "on-primary-container": "#5c0000",
                        "on-tertiary": "#002f67",
                        "on-secondary-container": "#aab8ff",
                        "primary-container": "#ff5540"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "xs": "4px",
                        "xl": "48px",
                        "md": "16px",
                        "unit": "4px",
                        "gutter": "20px",
                        "lg": "24px",
                        "margin": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "h2": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "h3": ["Space Grotesk"],
                        "h1": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.2", "letterSpacing": "0em", "fontWeight": "700"}],
                        "h1": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen board-texture flex flex-col items-center justify-center p-md">
<!-- Top AppBar (JSON Mapping) -->
<header class="bg-secondary-container dark:bg-secondary-container text-on-secondary-container dark:text-on-secondary-container flex justify-between items-center w-full px-md py-sm max-w-full docked full-width top-0 fixed z-50 border-b-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<div class="font-h2 text-h2 text-on-secondary-container uppercase tracking-widest">
            Global Recall
        </div>
<div class="flex gap-md">
<button class="hover:scale-105 transition-transform active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined">timer</span>
</button>
<button class="hover:scale-105 transition-transform active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined">language</span>
</button>
<button class="hover:scale-105 transition-transform active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined">analytics</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="w-full max-w-4xl mt-xl flex flex-col items-center gap-xl py-xl">
<!-- Title Section -->
<div class="text-center space-y-sm">
<h1 class="font-h1 text-h1 text-primary uppercase tracking-tighter drop-shadow-[4px_4px_0px_rgba(0,0,0,1)]">
                GLOBAL RECALL
            </h1>
<div class="flex items-center justify-center gap-xs">
<span class="h-2 w-12 bg-tertiary"></span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">The Ultimate Geography Challenge</span>
<span class="h-2 w-12 bg-tertiary"></span>
</div>
</div>
<!-- Central Game Card (Bento Grid Style) -->
<div class="relative w-full bg-surface-container border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-lg linen-overlay">
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg mb-xl">
<!-- Game Mode Buttons as Tactile Tiles -->
<button class="group flex flex-col items-start bg-secondary p-md border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,0.5)] hover:shadow-none hover:translate-x-[6px] hover:translate-y-[6px] transition-all">
<div class="w-full flex justify-between items-start">
<span class="material-symbols-outlined text-4xl text-on-secondary" style="font-variation-settings: 'FILL' 1;">public</span>
<div class="bg-black text-white px-sm py-xs font-label-caps text-[10px]">MODE 01</div>
</div>
<div class="mt-md">
<div class="font-h3 text-h3 text-on-secondary">Name All</div>
<div class="font-label-caps text-label-caps text-on-secondary/70 mt-xs">PB: 196 / 196</div>
</div>
</button>
<button class="group flex flex-col items-start bg-tertiary p-md border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,0.5)] hover:shadow-none hover:translate-x-[6px] hover:translate-y-[6px] transition-all">
<div class="w-full flex justify-between items-start">
<span class="material-symbols-outlined text-4xl text-on-tertiary" style="font-variation-settings: 'FILL' 1;">bolt</span>
<div class="bg-black text-white px-sm py-xs font-label-caps text-[10px]">MODE 02</div>
</div>
<div class="mt-md">
<div class="font-h3 text-h3 text-on-tertiary">Speed Run</div>
<div class="font-label-caps text-label-caps text-on-tertiary/70 mt-xs">PB: 12:45.02</div>
</div>
</button>
<button class="group flex flex-col items-start bg-surface-container-high p-md border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,0.5)] hover:shadow-none hover:translate-x-[6px] hover:translate-y-[6px] transition-all">
<div class="w-full flex justify-between items-start">
<span class="material-symbols-outlined text-4xl text-on-surface" style="font-variation-settings: 'FILL' 1;">schedule</span>
<div class="bg-black text-white px-sm py-xs font-label-caps text-[10px]">MODE 03</div>
</div>
<div class="mt-md">
<div class="font-h3 text-h3 text-on-surface">5 Min</div>
<div class="font-label-caps text-label-caps text-on-surface/70 mt-xs">PB: 82 COUNTRIES</div>
</div>
</button>
<button class="group flex flex-col items-start bg-primary-container p-md border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,0.5)] hover:shadow-none hover:translate-x-[6px] hover:translate-y-[6px] transition-all">
<div class="w-full flex justify-between items-start">
<span class="material-symbols-outlined text-4xl text-on-primary-container" style="font-variation-settings: 'FILL' 1;">timer_10</span>
<div class="bg-black text-white px-sm py-xs font-label-caps text-[10px]">MODE 04</div>
</div>
<div class="mt-md">
<div class="font-h3 text-h3 text-on-primary-container">10 Min</div>
<div class="font-label-caps text-label-caps text-on-primary-container/70 mt-xs">PB: 144 COUNTRIES</div>
</div>
</button>
</div>
<!-- Start Game CTA Section -->
<div class="flex flex-col items-center gap-md">
<button class="group relative bg-[#4ade80] hover:bg-[#22c55e] px-xl py-lg border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-[8px] active:translate-y-[8px] transition-all w-full max-w-sm">
<span class="font-h1 text-h2 text-black uppercase block text-center">START GAME</span>
<div class="absolute -top-4 -right-4 bg-error text-on-error border-2 border-black font-label-caps px-sm py-xs rotate-12">NEW UPDATE</div>
</button>
<p class="font-label-caps text-on-surface-variant opacity-60">SELECT A MODE TO BEGIN YOUR EXPEDITION</p>
</div>
<!-- Background Asset Integration -->
<div class="absolute -bottom-10 -left-10 w-40 h-20 opacity-20 pointer-events-none rotate-45">
<img alt="" class="w-full h-full object-cover border-2 border-black" data-alt="A macro photograph of a retro blue plastic board game component, possibly a boundary marker or a slider, resting on a textured navy surface. The lighting is harsh and direct, creating deep black shadows and high-contrast highlights that emphasize its tactile, physical quality. The aesthetic is inspired by 1980s tabletop games with vibrant primary colors and sharp geometric forms." src="https://lh3.googleusercontent.com/aida/ADBb0ujE4r0H2yerpCgwqn3nE2qf6XORADm3Wg86PBo03npbFrFYABoGGmz2DOjbQtovqSQTexDcJYPZ7doKh13k17gyx2P7xBP3ZpyMzk3WzVOS-l8jAmO8162IopR18tm0ZUGSOlNeHIW0HohoJIf-EO_A_ivVxV9XEB8gdmALNA_-ZAcQoTszZJYyW7RAytGf0ruzVVjInBNUyrmAyw_KhrPdMH6ANBiWuVfdZopOhpY6hqcQvwZizAlximw"/>
</div>
</div>
<!-- Secondary Navigation/Info (Bento style small cards) -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-md w-full">
<div class="bg-surface-container-high border-2 border-black p-sm flex flex-col items-center justify-center gap-xs shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<span class="material-symbols-outlined text-tertiary">emoji_events</span>
<span class="font-label-caps text-[10px] text-on-surface">LEADERBOARD</span>
</div>
<div class="bg-surface-container-high border-2 border-black p-sm flex flex-col items-center justify-center gap-xs shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<span class="material-symbols-outlined text-tertiary">history</span>
<span class="font-label-caps text-[10px] text-on-surface">RECORDS</span>
</div>
<div class="bg-surface-container-high border-2 border-black p-sm flex flex-col items-center justify-center gap-xs shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<span class="material-symbols-outlined text-tertiary">school</span>
<span class="font-label-caps text-[10px] text-on-surface">STUDY GUIDE</span>
</div>
<div class="bg-surface-container-high border-2 border-black p-sm flex flex-col items-center justify-center gap-xs shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<span class="material-symbols-outlined text-tertiary">settings</span>
<span class="font-label-caps text-[10px] text-on-surface">OPTIONS</span>
</div>
</div>
</main>
<!-- Bottom Nav Bar (JSON Mapping) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-gutter pb-lg pt-md bg-surface-container-highest border-t-4 border-black shadow-[0px_-4px_0px_0px_rgba(0,0,0,1)] rounded-t-xl">
<button class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-lg border-2 border-black p-sm shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 active:shadow-none hover:bg-primary-container hover:text-on-primary-container transition-all">
<span class="material-symbols-outlined">play_arrow</span>
<span class="font-label-caps text-label-caps">Play</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface p-sm grayscale opacity-70 active:translate-y-0.5 active:shadow-none hover:bg-primary-container hover:text-on-primary-container transition-all">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-label-caps text-label-caps">Stats</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface p-sm grayscale opacity-70 active:translate-y-0.5 active:shadow-none hover:bg-primary-container hover:text-on-primary-container transition-all">
<span class="material-symbols-outlined">settings_suggest</span>
<span class="font-label-caps text-label-caps">Map Settings</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface p-sm grayscale opacity-70 active:translate-y-0.5 active:shadow-none hover:bg-primary-container hover:text-on-primary-container transition-all">
<span class="material-symbols-outlined">flag</span>
<span class="font-label-caps text-label-caps">Give Up</span>
</button>
</nav>
</body></html>
