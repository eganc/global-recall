<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- TopAppBar from JSON - Navigation suppressed due to Transactional/End-of-flow Intent -->
<main class="flex-grow flex flex-col items-center justify-center p-lg relative z-10 w-full max-w-4xl mx-auto">
<!-- Confetti/Celebratory Background Element (Decorative) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden opacity-30 flex justify-center items-center">
<div class="w-full h-full bg-[url('{{DATA:IMAGE:IMAGE_3}}')] bg-repeat-x opacity-20 transform scale-150" data-alt="A retro 8-bit style celebratory background featuring neon blue pixelated confetti and fireworks bursting against a dark deep navy background. The aesthetic is chunky, low-resolution arcade game style from the 1980s. Thick black outlines and high contrast elements create a tactile, brutalist digital vibe fitting for a game over victory screen."></div>
</div>
<div class="relative z-20 w-full text-center space-y-xl">
<!-- Headline -->
<div class="space-y-sm relative inline-block">
<!-- Stacked text for retro drop shadow effect -->
<h1 class="font-h1 text-h1 text-black absolute top-1 left-1 md:top-2 md:left-2 tracking-widest uppercase w-full">WORLD CONQUERED!</h1>
<h1 class="font-h1 text-h1 text-primary relative z-10 tracking-widest uppercase border-black" style="-webkit-text-stroke: 2px black;">WORLD CONQUERED!</h1>
</div>
<!-- Stats Container - Bento Grid / Tactile Tiles -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg w-full max-w-2xl mx-auto">
<!-- Score Tile -->
<div class="bg-surface-container border-4 border-black p-lg flex flex-col items-center justify-center shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] relative">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-sm tracking-widest">Countries Found</span>
<div class="font-h1 text-h1 text-on-surface">195<span class="text-on-surface-variant">/195</span></div>
</div>
<!-- Time Tile -->
<div class="bg-surface-container border-4 border-black p-lg flex flex-col items-center justify-center shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] relative">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-sm tracking-widest">Clear Time</span>
<div class="font-h1 text-h1 text-tertiary-fixed-dim">12:45</div>
</div>
<!-- Personal Best Badge Tile (Spans full width on mobile) -->
<div class="md:col-span-2 bg-primary border-4 border-black p-md flex items-center justify-center gap-md shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] relative overflow-hidden">
<!-- Retro stripes detail inside badge -->
<div class="absolute -left-4 -top-4 w-16 h-32 bg-on-primary opacity-20 transform rotate-45"></div>
<div class="absolute -right-4 -bottom-4 w-16 h-32 bg-on-primary opacity-20 transform rotate-45"></div>
<span class="material-symbols-outlined text-[48px] text-on-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<div class="flex flex-col text-left">
<span class="font-h3 text-h3 text-on-primary uppercase leading-none">New Personal Best!</span>
<span class="font-label-caps text-label-caps text-on-primary opacity-80 uppercase mt-xs">Previous: 14:22</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-md mt-xl w-full max-w-md mx-auto">
<!-- Play Again Button -->
<button class="w-full sm:w-auto bg-tertiary-container text-on-tertiary-container border-4 border-black px-xl py-md font-h3 text-h3 uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:scale-[1.02] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">replay</span>
                    Play Again
                </button>
<!-- Share Result Button -->
<button class="w-full sm:w-auto bg-surface-container-highest text-on-surface border-4 border-black px-xl py-md font-h3 text-h3 uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-surface-variant hover:scale-[1.02] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">share</span>
                    Share
                </button>
</div>
</div>
